<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="admin-panel">
    <h3>Paste your Textbook Paragraph here:</h3>
    <textarea id="paragraph-input" placeholder="Example: RAM is temporary memory. A CPU is the brain of the computer. A Bit is a 0 or 1..."></textarea>
    <button id="convert-btn">Step 1: Convert to Notes</button>
    
    <div id="notes-preview-area" class="hidden">
        <h3>Verify your Notes:</h3>
        <textarea id="note-input"></textarea>
        <button id="generate-btn">Step 2: Start Quiz</button>
    </div>
</div>
<hr>
        <div class="header">
            <div id="lives">❤️❤️❤️</div>
            <div id="score">Score: 0</div>
        </div>

        <div id="quiz-box">
            <h2 id="question">Loading Question...</h2>
            <div id="answer-buttons" class="btn-grid"></div>
        </div>

        <div id="explanation-container" class="hidden">
            <p id="explanation-text"></p>
            <button id="next-btn">Next Question</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
